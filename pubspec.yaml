name: shubhlabh
description: ShubhLabh Patsanstha Finance App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  url_launcher: ^6.2.5
  cupertino_icons: ^1.0.6
  smooth_page_indicator: ^1.1.0
  pin_code_fields: ^8.0.1
  carousel_slider: ^4.2.1
  shared_preferences: ^2.3.2
  share_plus: ^7.2.2
  image_picker: ^1.0.0
  qr_flutter: ^4.1.0
  file_picker: ^8.1.2
  confetti: ^0.7.0
  razorpay_flutter: ^1.4.5
  sim_card_info: ^1.0.2
  intl_phone_number_input: ^0.7.4
  permission_handler: ^11.3.0
  lucide_icons_flutter: ^3.1.14+1




dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo0.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/logo0.png"
  adaptive_icon_scale: 0.25

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    # - assets/images/refer.png
    - assets/images/
  